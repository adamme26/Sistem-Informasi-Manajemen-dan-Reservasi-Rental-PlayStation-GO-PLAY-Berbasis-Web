<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Projects - Noval Mulyadi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            /* Warna latar estetik biru muda (seperti desain Anda sebelumnya) */
            background: linear-gradient(135deg, #448197 0%, #30687d 100%);
            color: #ffffff;
            min-height: 100vh;
        }

        /* Navbar */
        nav {
            padding: 25px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 28px;
            color: #ffffff;
            text-decoration: none;
            font-family: 'Caveat', cursive, 'Brush Script MT';
            font-weight: 700;
        }

        .nav-links { display: flex; gap: 30px; }
        .nav-links a {
            color: #ffffff; text-decoration: none; font-size: 14px; font-weight: 500; text-transform: uppercase;
            transition: 0.3s;
        }
        .nav-links a:hover { opacity: 0.7; }

        /* Header */
        .header {
            text-align: center;
            padding: 60px 20px;
        }
        
        .header h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 10px;
            animation: fadeDown 1s ease-out;
        }
        
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Grid / File Explorer Style */
        .projects-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 50px 100px 50px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 40px;
        }

        /* Card / Folder item */
        .project-card {
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            transition: all 0.4s ease;
            cursor: pointer;
            text-decoration: none;
            color: #1f2937;
            display: flex;
            flex-direction: column;
            transform: scale(0.95);
            opacity: 0;
            animation: zoomIn 0.8s ease-out forwards;
        }

        .project-card:hover {
            transform: scale(1.02) translateY(-10px);
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
        }

        @keyframes zoomIn {
            to { opacity: 1; transform: scale(1); }
        }

        .card-img {
            height: 220px;
            background: #f1f5f9;
            position: relative;
            overflow: hidden;
        }

        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .project-card:hover .card-img img {
            transform: scale(1.1);
        }

        .card-content {
            padding: 25px;
            text-align: center;
            background: #ffffff;
        }

        .card-content h3 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #4b5563;
        }

        .card-content p {
            font-size: 0.95rem;
            color: #94a3b8;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            nav { flex-direction: column; gap: 20px; padding: 20px; }
            .header { padding: 40px 20px; }
            .header h1 { font-size: 2.2rem; }
            .projects-container { 
                padding: 0 20px 50px 20px; 
                grid-template-columns: 1fr; /* 1 kolom penuh di HP */
                gap: 24px;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav>
        <a href="index.html" class="logo">Muhamad Noval M</a>
        <div class="nav-links">
            <a href="index.html">Back to Home</a>
        </div>
    </nav>

    <div class="header">
        <h1>My Digital Creations</h1>
    </div>

    <!-- Gallery / Explorer -->
    <div class="projects-container">
        
        <!-- Project 1: Go Play (Tautan asli Anda) -->
        <a href="/my-project" class="project-card" style="animation-delay: 0.1s;">
            <div class="card-img">
                <!-- Placeholder gambar controller/game -->
                <img src="https://images.unsplash.com/photo-1606144042614-b2417e99c4e3?auto=format&fit=crop&q=80&w=600" alt="Go Play">
            </div>
            <div class="card-content">
                <h3>GoPlay</h3>
                <p>Website PlayStation Rental</p>
            </div>
        </a>

        <!-- Project 2: CampusConnect -->
        <a href="https://github.com/novalmulyadi/campus-connect" class="project-card" style="animation-delay: 0.3s;" target="_blank">
            <div class="card-img">
                <img src="https://images.unsplash.com/photo-1523240795612-9a054b0db644?auto=format&fit=crop&q=80&w=600" alt="Campus Connect">
            </div>
            <div class="card-content">
                <h3>CampusConnect</h3>
                <p>Platform Forum & Marketplace Khusus Kampus</p>
            </div>
        </a>

        <!-- Project 3: WebAR Hologram -->
        <a href="/webar" class="project-card" style="animation-delay: 0.5s;">
            <div class="card-img">
                <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&q=80&w=600" alt="WebAR Hologram">
            </div>
            <div class="card-content">
                <h3>WebAR Particles</h3>
                <p>Interactive AR Planet with Hand Tracking</p>
            </div>
        </a>

        <!-- Project 4: Cafe POS -->
        <a href="/cafe-pos" class="project-card" style="animation-delay: 0.7s;" target="_blank">
            <div class="card-img">
                <img src="https://images.unsplash.com/photo-1554118811-1e0d58224f24?auto=format&fit=crop&q=80&w=600" alt="Cafe POS">
            </div>
            <div class="card-content">
                <h3>Cafe POS & Manajemen</h3>
                <p>Sistem Kasir dan Laporan Pemesanan Cafe Modern</p>
            </div>
        </a>

    </div>

</body>
</html>
